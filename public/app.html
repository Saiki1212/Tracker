<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0A0B0F">
  <meta name="color-scheme" content="dark">
  <title>Forge</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link rel="apple-touch-icon" href="/assets/logo.svg">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Vendor libs (CDN) — easy to swap for /vendor/*.js later -->
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
  <script defer src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
  <script>
    // Auth guard — runs before render
    if (!localStorage.getItem('forge.token')) {
      location.replace('/index.html');
    }
  </script>

  <div class="app" id="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark">F</div>
        <div class="brand-name">Forge</div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="sidebar-footer">
        <div class="avatar" id="userAvatar">·</div>
        <div class="user-info">
          <div class="user-name" id="userName">—</div>
          <div class="user-email" id="userEmail">—</div>
        </div>
        <button class="btn btn-ghost btn-icon" id="logoutBtn" title="Sign out" style="margin-left: auto;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </aside>
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <div class="main">
      <div class="topbar">
        <button class="hamburger" id="hamburger" aria-label="Open menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="topbar-title" id="topbarTitle">Dashboard</div>
        <div class="topbar-actions" id="topbarActions"></div>
      </div>

      <main class="view view-enter" id="view">
        <div class="empty"><div class="loader" style="margin: 0 auto;"></div></div>
      </main>

      <nav class="bottom-nav" id="bottomNav"></nav>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/helpers.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/ui/toast.js"></script>
  <script src="/js/ui/modal.js"></script>
  <script src="/js/ui/charts.js"></script>
  <script src="/js/ui/kanban.js"></script>
  <script src="/js/animations.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/pages/_ns.js"></script>
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/projects.js"></script>
  <script src="/js/pages/applications.js"></script>
  <script src="/js/pages/interviews.js"></script>
  <script src="/js/pages/resumes.js"></script>
  <script src="/js/pages/learning.js"></script>
  <script src="/js/pages/weekly.js"></script>
  <script src="/js/pages/notes.js"></script>
  <script src="/js/pages/analytics.js"></script>
  <script src="/js/pages/settings.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
